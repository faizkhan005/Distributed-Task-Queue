services:
  api:
    build:
      context: .
      dockerfile: TaskQueue.Api/Dockerfile
    container_name: taskqueue-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=taskqueue;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}
      - ConnectionStrings__Redis=redis:6379
      - HANGFIRE_DASHBOARD_USER=${HANGFIRE_DASHBOARD_USER:-admin}
      - HANGFIRE_DASHBOARD_PASS=${HANGFIRE_DASHBOARD_PASS:-admin}
      - NOTIFICATION_FAILURE_RATE=${NOTIFICATION_FAILURE_RATE:-0.2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - taskqueue-net
  postgres:
    image: postgres:16-alpine
    container_name: taskqueue-postgres
    environment:
      POSTGRES_DB: taskqueue
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskqueue"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - taskqueue-net

  redis:
    image: redis:7-alpine
    container_name: taskqueue-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - taskqueue-net

volumes:
  postgres-data:
  redis-data:

networks:
  taskqueue-net:
    driver: bridge
